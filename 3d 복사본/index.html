<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
   .stage{
  width: 100%;
  height: 100vh;
  perspective: 1400px;
  display: grid;
  place-items: center;
  overflow: hidden;
  cursor: grab;
}



.stage:active{ cursor: grabbing; }

.carousel{
  position: relative;
  width: 520px;
  height: 320px;
  transform-style: preserve-3d;
  will-change: transform;
}

.card{
  position: absolute;
  width: 520px;
  height: 320px;
  overflow: hidden;
  background: #000;
  box-shadow: 0 24px 60px rgba(0,0,0,.2);
}
.card a{width: 100%; height: 100%; display: block;}

.card img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

.stage { -webkit-user-select: none; user-select: none; }

  </style>


</head>
<body>

<div class="stage" id="stage">
  <div class="carousel" id="carousel">
    <div class="card">
      <a href="/about.html">
        <img src="poster.png">
      </a>
    </div>
    <div class="card">
      <a href="">
        <img src="poster.png">
      </a>
    </div>
    <div class="card">
      <a href="/about.html">
        <img src="poster.png">
      </a>
    </div>
    <div class="card">
      <a href="/about.html">
        <img src="poster.png">
      </a>
    </div>
    <div class="card">
      <a href="/about.html">
        <img src="poster.png">
      </a>
    </div>
    <div class="card">
      <a href="/about.html">
        <img src="poster.png">
      </a>
    </div>
    
  </div>
</div>

  

<script>
(() => {
  const stage = document.getElementById("stage");
  const carousel = document.getElementById("carousel");
  const cards = [...carousel.children];

  const COUNT = cards.length;
  const RADIUS = 700;        // 원 크기
  const SENS_Y = 0.28;       // 좌우 감도 (rotateY)
  const SENS_X = 0.22;       // 상하 감도 (rotateX)

  let rotY = 0;
  let rotX = 0;

  let isDown = false;
  let startX = 0, startY = 0;
  let startRotY = 0, startRotX = 0;

  const clamp = (v, min, max) => Math.min(Math.max(v, min), max);

  // 카드 원형 배치
  cards.forEach((card, i) => {
    const angle = (360 / COUNT) * i;
    card.style.transform = `rotateY(${angle}deg) translateZ(${RADIUS}px)`;
  });

  const render = () => {
    // rotX는 너무 뒤집히면 어지러워서 적당히 제한 추천
    const safeX = clamp(rotX, -35, 35);

    carousel.style.transform =
      `rotateX(${safeX}deg) rotateY(${rotY}deg)`;

    requestAnimationFrame(render);
  };

  const down = (clientX, clientY) => {
    isDown = true;
    startX = clientX;
    startY = clientY;
    startRotY = rotY;
    startRotX = rotX;
  };

  const move = (clientX, clientY) => {
    if (!isDown) return;

    const dx = clientX - startX;
    const dy = clientY - startY;

    // 좌우 드래그: Y축 회전
    rotY = startRotY + dx * SENS_Y;

    // 위아래 드래그: X축 회전 (위로 드래그하면 위로 젖혀지는 느낌)
    rotX = startRotX - dy * SENS_X;
  };

  const up = () => { isDown = false; };

  // Mouse
  stage.addEventListener("mousedown", e => down(e.clientX, e.clientY));
  window.addEventListener("mousemove", e => move(e.clientX, e.clientY));
  window.addEventListener("mouseup", up);

  // Touch
  stage.addEventListener("touchstart", e => down(e.touches[0].clientX, e.touches[0].clientY), { passive:true });
  stage.addEventListener("touchmove", e => move(e.touches[0].clientX, e.touches[0].clientY), { passive:true });
  stage.addEventListener("touchend", up);

  render();
})();
</script>



</body>
</html>
